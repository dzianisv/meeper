name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  WEBSITE_URL: https://meeper.ai/
  ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          BUILD_DATE="$(date -u +%Y.%m.%d)"
          BUILD_VERSION="$(date -u +%Y.%-m.%-d)"
          GIT_DESCRIBE="$(git describe --tags --always)"
          RELEASE_VERSION="${BUILD_DATE}-${GIT_DESCRIBE}"
          ASSET_NAME="transcriber-${RELEASE_VERSION}.zip"

          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "build_version=${BUILD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "git_describe=${GIT_DESCRIBE}" >> "$GITHUB_OUTPUT"
          echo "release_version=${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "asset_name=${ASSET_NAME}" >> "$GITHUB_OUTPUT"

      - name: Stamp extension manifest version
        env:
          BUILD_VERSION: ${{ steps.meta.outputs.build_version }}
          RELEASE_VERSION: ${{ steps.meta.outputs.release_version }}
        run: |
          node - <<'NODE'
          const fs = require("fs");

          const manifestPath = "ext/manifest.json";
          const manifest = JSON.parse(fs.readFileSync(manifestPath, "utf8"));

          manifest.version = process.env.BUILD_VERSION;
          manifest.version_name = process.env.RELEASE_VERSION;

          fs.writeFileSync(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

      - name: Install deps
        run: npm ci

      - name: Check TypeScript
        run: npm run ts

      - name: Create app build
        run: npm run build

      - name: Run extension smoke test
        run: xvfb-run -a npm run test:extension:load

      - name: Rename release zip asset
        run: |
          mv "dist/ext.zip" "dist/${{ steps.meta.outputs.asset_name }}"

      - name: Upload asset to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/${{ steps.meta.outputs.asset_name }}
          fail_on_unmatched_files: true
