name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Typecheck and build extension
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Check TypeScript
        run: npm run ts

      - name: Create app build
        run: npm run build

      - name: Upload extension zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: dist/*.zip
          if-no-files-found: error
